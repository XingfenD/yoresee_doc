services:
  nginx:
    image: nginx:alpine
    container_name: yoresee_doc_nginx
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - frontend
      - backend
      - collab
    networks:
      - yoresee_doc_network
    restart: unless-stopped

  frontend:
    build:
      context: ..
      dockerfile: frontend/Dockerfile.prod
      target: runner
    image: yoresee_doc_frontend_runner:latest
    container_name: yoresee_doc_frontend
    environment:
      - NODE_ENV=production
      - VITE_GRPC_WEB_ENDPOINT=/grpc
    networks:
      - yoresee_doc_network
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: yoresee_doc_postgres
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: your_password
      POSTGRES_DB: yoresee_doc_db
    volumes:
      - yoresee_doc_postgres_data:/var/lib/postgresql/data
    networks:
      - yoresee_doc_network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: yoresee_doc_redis
    environment:
      REDIS_PASSWORD: your_redis_password
    volumes:
      - yoresee_doc_redis_data:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf
    networks:
      - yoresee_doc_network
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management
    container_name: yoresee_doc_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - yoresee_doc_rabbitmq_data:/var/lib/rabbitmq
      - ./rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./logs/rabbitmq:/var/log/rabbitmq
    networks:
      - yoresee_doc_network
    restart: unless-stopped

  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile.prod
      target: runner
    image: yoresee_doc_backend_runner:latest
    container_name: yoresee_doc_backend
    volumes:
      - ../backend/config.toml:/app/config.toml
    ports:
      - "9090:9090"
    depends_on:
      - postgres
      - redis
      - rabbitmq
    networks:
      - yoresee_doc_network
    restart: unless-stopped

  collab-core:
    build:
      context: ..
      dockerfile: collab/Dockerfile.prod
    image: yoresee_doc_collab_core:latest
    container_name: yoresee_doc_collab_core
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=your_redis_password
      - REDIS_DB=0
      - BACKEND_ADDR=backend:9090
    depends_on:
      - redis
      - backend
    networks:
      - yoresee_doc_network
    restart: unless-stopped

  collab:
    build:
      context: ../collab-go
      dockerfile: Dockerfile.prod
    image: yoresee_doc_collab_gateway:latest
    container_name: yoresee_doc_collab
    environment:
      - ADDR=:1234
      - JWT_SECRET=yoresee_doc_jwt_secret_key
      - COLLAB_CORE_URL=ws://collab-core:1234
    depends_on:
      - collab-core
    networks:
      - yoresee_doc_network
    restart: unless-stopped

volumes:
  yoresee_doc_postgres_data:
  yoresee_doc_redis_data:
  yoresee_doc_rabbitmq_data:

networks:
  yoresee_doc_network:
    driver: bridge