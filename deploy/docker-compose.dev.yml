services:
  nginx:
    image: nginx:alpine
    container_name: yoresee_doc_nginx
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - frontend
      - backend
      - collab
    networks:
      - yoresee_doc_network
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      target: dev
    image: yoresee_doc_frontend_dev:latest
    container_name: yoresee_doc_frontend
    volumes:
      - ../frontend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - VITE_API_BASE_URL=/api
    networks:
      - yoresee_doc_network
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: yoresee_doc_postgres
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: your_password
      POSTGRES_DB: yoresee_doc_db
    ports:
      - "5432:5432"
    volumes:
      - yoresee_doc_postgres_data:/var/lib/postgresql/data
    networks:
      - yoresee_doc_network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: yoresee_doc_redis
    environment:
      REDIS_PASSWORD: your_redis_password
    volumes:
      - yoresee_doc_redis_data:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf
    networks:
      - yoresee_doc_network
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management
    container_name: yoresee_doc_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
    volumes:
      - yoresee_doc_rabbitmq_data:/var/lib/rabbitmq
      - ./rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./logs/rabbitmq:/var/log/rabbitmq
    networks:
      - yoresee_doc_network
    restart: unless-stopped

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
      target: dev
    image: yoresee_doc_backend_dev:latest
    container_name: yoresee_doc_backend
    volumes:
      - ../backend:/app
    ports:
      - "2345:2345"
    depends_on:
      - postgres
      - redis
      - rabbitmq
    networks:
      - yoresee_doc_network
    restart: unless-stopped

  collab-core:
    build:
      context: ../collab
      dockerfile: Dockerfile
    image: yoresee_doc_collab_core:latest
    container_name: yoresee_doc_collab_core
    networks:
      - yoresee_doc_network
    restart: unless-stopped

  collab:
    build:
      context: ../collab-go
      dockerfile: Dockerfile
    image: yoresee_doc_collab_gateway:latest
    container_name: yoresee_doc_collab
    environment:
      - ADDR=:1235
      - JWT_SECRET=yoresee_doc_jwt_secret_key
      - COLLAB_CORE_URL=ws://collab-core:1234
    depends_on:
      - collab-core
    networks:
      - yoresee_doc_network
    restart: unless-stopped

volumes:
  yoresee_doc_postgres_data:
  yoresee_doc_redis_data:
  yoresee_doc_rabbitmq_data:

networks:
  yoresee_doc_network:
    driver: bridge
