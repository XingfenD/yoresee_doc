services:
  nginx:
    image: nginx:alpine
    container_name: yoresee_doc_nginx
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - frontend
      - backend
      - collab
    networks:
      - yoresee_doc_network
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      target: dev
    image: yoresee_doc_frontend_dev:latest
    container_name: yoresee_doc_frontend
    volumes:
      - ../frontend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - VITE_GRPC_WEB_ENDPOINT=/grpc
    networks:
      - yoresee_doc_network
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: yoresee_doc_postgres
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: your_password
      POSTGRES_DB: yoresee_doc_db
    ports:
      - "5432:5432"
    volumes:
      - yoresee_doc_postgres_data:/var/lib/postgresql/data
    networks:
      - yoresee_doc_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d yoresee_doc_db"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: yoresee_doc_redis
    environment:
      REDIS_PASSWORD: your_redis_password
    ports:
      - "6379:6379"
    volumes:
      - yoresee_doc_redis_data:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf
    networks:
      - yoresee_doc_network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management
    container_name: yoresee_doc_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
    volumes:
      - yoresee_doc_rabbitmq_data:/var/lib/rabbitmq
      - ./rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./logs/rabbitmq:/var/log/rabbitmq
    networks:
      - yoresee_doc_network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
      target: dev
    image: yoresee_doc_backend_dev:latest
    container_name: yoresee_doc_backend
    volumes:
      - ../backend:/app
    ports:
      - "2345:2345"
      - "9090:9090"
    environment:
      - BACKEND_INTERNAL_RPC_KEY=yoresee_doc_internal_key
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://backend:9090/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - yoresee_doc_network
    restart: unless-stopped

  collab-core:
    build:
      context: ..
      dockerfile: collab/Dockerfile
    image: yoresee_doc_collab_core:latest
    container_name: yoresee_doc_collab_core
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=your_redis_password
      - REDIS_DB=0
      - BACKEND_ADDR=backend:9090
      - DIRTY_DOC_MQ=rabbitmq
      - DIRTY_DOC_TOPIC=collab.dirty_docs
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
      - INTERNAL_RPC_KEY=yoresee_doc_internal_key
      - DIRTY_DOC_NOTIFY_THRESHOLD=5
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - yoresee_doc_network
    volumes:
      - ../collab:/app
    restart: unless-stopped

  collab:
    build:
      context: ../collab-go
      dockerfile: Dockerfile
    image: yoresee_doc_collab_gateway:latest
    container_name: yoresee_doc_collab
    environment:
      - ADDR=:1234
      - JWT_SECRET=yoresee_doc_jwt_secret_key
      - COLLAB_CORE_URL=ws://collab-core:1234
    volumes:
      - ../collab-go:/app
    depends_on:
      - collab-core
    networks:
      - yoresee_doc_network
    restart: unless-stopped

  snapshot-worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
      target: dev
    image: yoresee_doc_snapshot_worker_dev:latest
    container_name: yoresee_doc_snapshot_worker
    volumes:
      - ../backend:/app
    environment:
      - DIRTY_DOC_MQ=rabbitmq
      - DIRTY_DOC_TOPIC=collab.dirty_docs
      - COLLAB_CORE_HTTP=http://collab-core:1234
    command: sh -c "go mod download && go run ./cmd/snapshot-worker"
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - yoresee_doc_network
    restart: unless-stopped

volumes:
  yoresee_doc_postgres_data:
  yoresee_doc_redis_data:
  yoresee_doc_rabbitmq_data:

networks:
  yoresee_doc_network:
    driver: bridge
